<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Dashboard - UIL Science</title>
<link rel="stylesheet" href="assets/uil.css" />
</head>
<body data-page="team" data-title="Team Dashboard">
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page">
      <div class="pagehead">
        <div class="row">
          <div>
            <h1>Team Dashboard</h1>
            <div class="subtitle" id="team-subtitle">Live team records from practice attempts and the verified question bank.</div>
          </div>
          <div class="btnrow">
            <a class="btn" href="admin-review.html">Review Bank</a>
            <a class="btn primary" href="practice.html">Practice Mode</a>
          </div>
        </div>
      </div>

      <div id="root"><div class="empty"><div class="h">Loading team data...</div></div></div>
    </div>
  </div>
</div>

<script src="assets/api.js"></script>
<script src="assets/uil.js?v=20260712-session-password"></script>
<script>
(function(){
  var root = document.getElementById('root');
  var state = { subject: 'overall', summary: null, subjects: [], leaderboard: [] };

  async function boot(){
    if(!(await API.health())){ API.offlineBanner(); root.innerHTML = offlineCard(); return; }
    try {
      var data = await Promise.all([
        API.teamSummary(),
        API.teamSubjects(),
        API.teamLeaderboard(state.subject)
      ]);
      state.summary = data[0];
      state.subjects = data[1] || [];
      state.leaderboard = data[2] || [];
      render();
    } catch(err) {
      if(err.status === 403){ root.innerHTML = coachGate(); return; }
      root.innerHTML = errorCard(err.message || 'Could not load team data.');
    }
  }

  async function loadLeaderboard(subject){
    state.subject = subject;
    var body = document.getElementById('lbbody');
    if(body) body.innerHTML = '<tr><td colspan="5" class="faint">Loading...</td></tr>';
    try {
      state.leaderboard = await API.teamLeaderboard(subject);
      renderLeaderboard();
    } catch(err) {
      if(body) body.innerHTML = '<tr><td colspan="5" class="faint">'+escapeHtml(err.message || 'Could not load leaderboard.')+'</td></tr>';
    }
  }

  function render(){
    var s = state.summary || {};
    document.getElementById('team-subtitle').textContent =
      s.students ? s.students + ' competitors, ' + s.sessions + ' submitted sessions, ' + s.questions + ' questions in the bank.' :
      'No team records yet. This page fills in after students and practice attempts exist.';

    var html = '';
    html += '<div class="grid g4" style="margin-bottom:18px">';
    html += metricCard('Competitors', s.students || 0, (s.activeStudents || 0) + ' active with submitted practice');
    html += metricCard('Practice Sessions', s.sessions || 0, 'Submitted attempts only');
    html += metricCard('Question Bank', s.questions || 0, 'Imported database records');
    html += metricCard('Review Queue', s.reviewPending || 0, (s.integrityIssues || 0) + ' integrity issues');
    html += '</div>';

    if(!s.students && !s.questions){
      html += '<div class="empty" style="margin-bottom:18px"><div class="h">No live team data yet</div><div class="d">Create student profiles, import approved questions, and submit practice attempts to populate this dashboard.</div><a class="btn primary" href="admin-review.html">Open Admin Review</a></div>';
    }

    html += '<div class="grid g2">';
    html += readinessCard(s);
    html += subjectCard(state.subjects);
    html += '</div>';

    html += '<div class="card hover" style="margin-top:16px">';
    html += '<div class="cardhead"><h3>Leaderboard</h3><span class="faint" style="font-size:12px">Real submitted answers only</span></div>';
    html += '<div class="lbtoolbar" id="lbfilter">';
    html += filterButton('overall','Overall') + filterButton('biology','Biology') + filterButton('chemistry','Chemistry') + filterButton('physics','Physics');
    html += '</div><div style="overflow-x:auto"><table class="lb"><thead><tr><th>#</th><th>Student</th><th>Score</th><th>Accuracy</th><th>Answered</th></tr></thead><tbody id="lbbody"></tbody></table></div>';
    html += '</div>';

    html += '<div class="card hover" style="margin-top:16px">';
    html += '<div class="cardhead"><h3>Coach Workflow</h3><a class="btn sm" href="admin-review.html">Review questions</a></div>';
    html += row('Question records waiting for review', '<b>'+Number(s.reviewPending || 0)+'</b>');
    html += row('Flagged, rejected, or mismatched records', '<b>'+Number(s.integrityIssues || 0)+'</b>');
    html += row('Top-3 cumulative team score', '<b class="num">'+Number(s.topThreeScore || 0)+'</b>');
    html += '<div class="note" style="margin-top:14px"><div>Team pages intentionally show empty states instead of sample data. Coaches only see what has been imported, approved, and submitted.</div></div>';
    html += '</div>';

    root.innerHTML = html;
    bindFilters();
    renderLeaderboard();
    var ring = document.getElementById('team-ring');
    if(ring) UIL.ring(ring, readinessPct(s), 'var(--accent-2)');
  }

  function metricCard(title, value, detail){
    return '<div class="card hover"><div class="cardhead"><h3>'+title+'</h3></div><div class="kpi">'+Number(value || 0)+'</div><p class="muted" style="font-size:13px;margin:4px 0 0">'+escapeHtml(detail)+'</p></div>';
  }

  function readinessCard(s){
    var pct = readinessPct(s);
    if(!(s.students || s.sessions || s.questions)){
      return emptyCard('Team Readiness','Readiness appears after the team has students, question-bank records, and submitted practice.');
    }
    return '<div class="card hover"><div class="cardhead"><h3>Team Readiness</h3><span class="tag neutral">Derived</span></div>'+
      '<div style="display:flex;align-items:center;gap:20px"><div class="ring" id="team-ring"><div class="val"><b>'+pct+'%</b><small>ready</small></div></div>'+
      '<div style="flex:1">'+
      row('Active competitors', '<b>'+Number(s.activeStudents || 0)+' / '+Number(s.students || 0)+'</b>')+
      row('Submitted sessions', '<b>'+Number(s.sessions || 0)+'</b>')+
      row('Approved bank coverage', '<b>'+Math.max(0, Number(s.questions || 0) - Number(s.reviewPending || 0))+' / '+Number(s.questions || 0)+'</b>')+
      '</div></div></div>';
  }

  function readinessPct(s){
    var studentPart = s.students ? (Number(s.activeStudents || 0) / Number(s.students || 1)) * 45 : 0;
    var practicePart = Math.min(Number(s.sessions || 0), Math.max(Number(s.students || 0), 1)) / Math.max(Number(s.students || 0), 1) * 30;
    var bankPart = s.questions ? ((Number(s.questions || 0) - Number(s.reviewPending || 0)) / Number(s.questions || 1)) * 25 : 0;
    return Math.round(Math.max(0, Math.min(100, studentPart + practicePart + bankPart)));
  }

  function subjectCard(subjects){
    if(!subjects.length) return emptyCard('Subject Coverage','Subject accuracy appears after students submit answers from approved questions.');
    var rows = subjects.map(function(s){
      var cls = subjectClass(s.subject);
      var label = cap(s.subject);
      var acc = s.accuracy === null ? 'No attempts' : s.accuracy + '%';
      return '<div class="rowline"><div><div class="t"><span class="tag '+cls+'">'+label+'</span></div><div class="s">'+Number(s.seen || 0)+' answers seen</div></div><b>'+acc+'</b></div>';
    }).join('');
    return '<div class="card hover"><div class="cardhead"><h3>Subject Coverage</h3><span class="faint" style="font-size:12px">Team aggregate</span></div>'+rows+'</div>';
  }

  function renderLeaderboard(){
    var body = document.getElementById('lbbody');
    if(!body) return;
    if(!state.leaderboard.length){
      body.innerHTML = '<tr><td colspan="5" class="faint">No submitted answers for this filter yet.</td></tr>';
      return;
    }
    body.innerHTML = state.leaderboard.map(function(r){
      return '<tr><td class="rank">'+r.rank+'</td><td class="who">'+escapeHtml(r.name)+'</td><td class="num">'+Number(r.score || 0)+'</td><td class="num">'+(r.accuracy === null ? '-' : r.accuracy + '%')+'</td><td class="num">'+Number(r.attempted || 0)+'</td></tr>';
    }).join('');
  }

  function bindFilters(){
    var filter = document.getElementById('lbfilter');
    if(!filter) return;
    filter.addEventListener('click', function(e){
      var b = e.target.closest('.chip');
      if(!b) return;
      filter.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('on'); });
      b.classList.add('on');
      loadLeaderboard(b.dataset.k);
    });
  }

  function filterButton(key, label){
    return '<button class="chip '+(state.subject === key ? 'on' : '')+'" data-k="'+key+'">'+label+'</button>';
  }

  function coachGate(){
    return '<div class="empty"><div class="h">Coach access required</div><div class="d">This prototype uses the local role header. Switch this browser to coach mode to view team records.</div><button class="btn primary" onclick="localStorage.setItem(\'uil-role\',\'coach\');location.reload()">Use coach mode</button></div>';
  }

  function offlineCard(){
    return '<div class="empty"><div class="h">Backend not connected</div><div class="d">Start the server, then reopen this page from the app origin. No sample data is shown here.</div></div>';
  }

  function errorCard(message){
    return '<div class="errorbox"><div>'+escapeHtml(message)+'</div></div>';
  }

  function emptyCard(title, detail){
    return '<div class="card"><div class="cardhead"><h3>'+title+'</h3></div><div class="empty" style="padding:22px 10px"><div class="d">'+escapeHtml(detail)+'</div></div></div>';
  }

  function row(label, value){
    return '<div class="rowline"><div class="t">'+label+'</div><div>'+value+'</div></div>';
  }

  function subjectClass(subject){
    return subject === 'biology' ? 'bio' : subject === 'chemistry' ? 'chem' : subject === 'physics' ? 'phys' : 'neutral';
  }

  function cap(s){
    s = String(s || '');
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
  }

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  boot().catch(function(e){ root.innerHTML = errorCard(e.message || 'Could not load team data.'); });
})();
</script>
</body>
</html>
